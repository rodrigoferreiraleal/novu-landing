<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVU — Do avião à cidadania</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZJLBVGPQT5"></script>
<script>
window.dataLayer = window.dataLayer || [];

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--blue-deep:#0A2540;
--blue-mid:#1A4A7A;
--blue-bright:#2E7FD4;
--blue-light:#EBF4FF;
--blue-pale:#F5F9FF;
--white:#FFFFFF;
--gray-100:#F8FAFC;
--gray-200:#E8EEF5;
--gray-400:#8FA3BC;
--gray-600:#4A6580;
--text:#0A2540;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:'DM Sans',sans-serif;
color:var(--text);
background:var(--white);
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--gray-200);
padding:0 5%;
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
}

.nav-logo{
font-family:'Playfair Display',serif;
font-size:1.5rem;
font-weight:700;
color:var(--blue-deep);
}

.nav-logo span{color:var(--blue-bright);}

.nav-right{
display:flex;
align-items:center;
gap:14px;
}

.lang-selector{display:flex;gap:4px;}

.lang-btn{
background:transparent;
border:1.5px solid var(--gray-200);
color:var(--gray-600);
padding:4px 10px;
border-radius:50px;
font-family:'DM Sans',sans-serif;
font-size:0.78rem;
font-weight:600;
cursor:pointer;
transition:all .2s;
}

.lang-btn:hover{
border-color:var(--blue-bright);
color:var(--blue-bright);
}

.lang-btn.active{
background:var(--blue-deep);
color:white;
border-color:var(--blue-deep);
}

.nav-cta{
background:var(--blue-deep);
color:white;
border:none;
padding:9px 22px;
border-radius:50px;
font-family:'DM Sans',sans-serif;
font-size:.88rem;
font-weight:500;
cursor:pointer;
transition:all .2s;
}

.nav-cta:hover{
background:var(--blue-mid);
transform:translateY(-1px);
}

.nav-docs-btn{
background:var(--blue-light);
color:var(--blue-mid);
border:1.5px solid #C8DEFA;
padding:7px 16px;
border-radius:50px;
font-family:'DM Sans',sans-serif;
font-size:.84rem;
font-weight:600;
text-decoration:none;
transition:all .2s;
white-space:nowrap;
}

.nav-docs-btn:hover{
background:var(--blue-bright);
color:white;
border-color:var(--blue-bright);
}

/* MOBILE NAV FIX */

@media (max-width:600px){

nav{
padding:0 16px;
height:56px;
}

.nav-right{
display:flex;
align-items:center;
gap:8px;
flex-wrap:nowrap;
}

.nav-docs-btn{
display:inline-flex;
padding:6px 12px;
font-size:.78rem;
white-space:nowrap;
}

.nav-cta{
display:inline-flex;
padding:7px 14px;
font-size:.8rem;
}

}

@media (max-width:400px){

.lang-btn{
padding:3px 7px;
font-size:.7rem;
}

}

/* RESTO DO SITE */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:90px 5% 52px;
background:linear-gradient(160deg,#F5F9FF 0%,#EBF3FF 40%,#FAFCFF 100%);
position:relative;
overflow:hidden;
}

.hero-badge{
display:inline-flex;
align-items:center;
gap:8px;
background:white;
border:1px solid var(--gray-200);
border-radius:50px;
padding:6px 16px;
font-size:.8rem;
font-weight:500;
color:var(--gray-600);
margin-bottom:24px;
box-shadow:0 2px 12px rgba(0,0,0,.06);
}

.hero-title{
font-family:'Playfair Display',serif;
font-size:clamp(2.6rem,5.5vw,4.6rem);
font-weight:700;
line-height:1.1;
text-align:center;
color:var(--blue-deep);
max-width:760px;
margin-bottom:18px;
}

.hero-title em{
font-style:normal;
color:var(--blue-bright);
}

.hero-sub{
font-size:1.08rem;
color:var(--gray-600);
text-align:center;
max-width:520px;
line-height:1.65;
margin-bottom:36px;
}

.hero-cta-wrap{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.btn-primary{
background:var(--blue-deep);
color:white;
border:none;
padding:14px 34px;
border-radius:50px;
font-family:'DM Sans',sans-serif;
font-size:.97rem;
font-weight:600;
cursor:pointer;
transition:all .25s;
box-shadow:0 4px 20px rgba(10,37,64,.2);
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 8px 30px rgba(10,37,64,.28);
}

.btn-secondary{
background:transparent;
color:var(--blue-deep);
border:1.5px solid var(--gray-200);
padding:14px 28px;
border-radius:50px;
font-family:'DM Sans',sans-serif;
font-size:.97rem;
font-weight:500;
cursor:pointer;
transition:all .2s;
}

.btn-secondary:hover{
border-color:var(--blue-bright);
color:var(--blue-bright);
}

</style>
</head>

<body>

<nav>
<div class="nav-logo">N<span>O</span>VU</div>

<div class="nav-right">

<a href="/documentos.html" class="nav-docs-btn">📄 Documentos</a>

<a href="/especialistas.html" class="nav-docs-btn">🤝 Especialistas</a>

<div class="lang-selector">
<button class="lang-btn active">PT</button>
<button class="lang-btn">EN</button>
<button class="lang-btn">ES</button>
</div>

<button class="nav-cta">Experimentar grátis</button>

</div>
</nav>

<section class="hero">

<div class="hero-badge">
<span>Disponível agora — experimenta grátis</span>
</div>

<h1 class="hero-title">
A tecnologia que guia<br>
a sua jornada em <em>Portugal</em>
</h1>

<p class="hero-sub">
Do avião à cidadania — a NOVU guia-te por cada passo da tua vida em Portugal, de forma simples, clara e sem complicações.
</p>

<div class="hero-cta-wrap">
<button class="btn-primary">Fazer a minha primeira pergunta</button>
<button class="btn-secondary">Ver como funciona</button>
</div>

</section>

</body>
</html>
